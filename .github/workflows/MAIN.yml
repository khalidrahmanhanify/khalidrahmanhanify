name: Generate Snake

on:
  schedule:
    - cron: "0 */6 * * *" # runs every 6 hours
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Generate snake animation
        uses: Platane/snk@v3
        id: snake-gif
        with:
          github_user_name: khalidrahmanhanify

          # 🎨 Dark-mode neon palette (GitHub dark theme style)
          color_snake: "#00FFAA"
          color_dots: "#161b22,#0d1117,#0a1f1a,#00FFAA,#39d353"

          # 📦 Output files
          outputs: |
            dist/github-contribution-grid-snake.gif
            dist/github-contribution-grid-snake.svg

      - name: Show build status
        run: git status

      - name: Deploy to output branch (GitHub Pages)
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
