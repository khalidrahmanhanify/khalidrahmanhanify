# GitHub Action for generating a contribution graph with a snake eating your contributions.

name: Generate Snake

# Controls when the action will run.
on:
  # This action runs every 6 hours.
  schedule:
    - cron: "0 */6 * * *"
  # This command allows us to run the Action automatically from the Actions tab.
  workflow_dispatch:

permissions:
  contents: write # 👈 Now correctly aligned at the root level

# The sequence of runs in this workflow:
jobs:
  # This workflow contains a single job called "build"
  build:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:

    # Checks repo under $GITHUB_WORKSPACE, using v4 for Node compatibility
      - uses: actions/checkout@v4

    # Generates the snake using modern output syntax
      - uses: Platane/snk@v3
        id: snake-gif
        with:
          github_user_name: khalidrahmanhanify
          # Generates the files into the dist/ folder
          outputs: |
            dist/github-contribution-grid-snake.gif
            dist/github-contribution-grid-snake.svg

     # Show the status of the build. Makes it easier for debugging.
      - run: git status

      # Deploy directly to the output branch using GitHub Pages action
      # This removes the need for the broken 'ad-m/github-push-action' step completely!
      - uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
